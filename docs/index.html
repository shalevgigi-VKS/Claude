ילות בתחום.\n\n**מסקנה ל-Red Teaming:** הסנטימנט הנוכחי של \"תאוות בצע קיצונית\" בשוק עלול להעיד על שאננות מסוכנת. משקיעים נוטים להתעלם מסיכונים כאשר השוק עולה, אך ההיסטוריה מלמדת שתיקונים חדים מגיעים לרוב כאשר הציפיות גבוהות מדי. יש להישאר ערניים לסימני אזהרה ולשקול גידור סיכונים, גם בתקופות של אופוריה."
