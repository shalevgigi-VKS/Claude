    "content": "נכון ליום **שני, 20 במאי 2024, השעה 14:30 שעון ניו יורק**, השווקים ממשיכים להפגין אופטימיות זהירה, מונעת בעיקר על ידי סקטור הטכנולוגיה והבינה המלאכותית.\n\n*   **מדד הפחד והתאוות בצע של CNN:** עומד על **74** (Greed – תאוות בצע), המשקף סנטימנט שורי חזק בקרב המשקיעים, קרוב לרמות \"Extreme Greed\". זהו המשך למגמה של חודשים האחרונים, המעיד על ביטחון הולך וגובר בנכסי סיכון.\n*   **תמונת מצב שוק ההון:**\n    *   **S&P 500:** נסחר סביב **5,308 נקודות** (+0.45%), ממשיך לשבור שיאים חדשים, מונע על ידי דוחות חזקים של חברות טכנולוגיה.\n    *   **נאסד\"ק (Nasdaq Composite):** בולט עם עליות של **+0.72%** סביב **16,790 נקודות**, בהובלת מניות השבבים וה-AI.\n    *   **דאו ג'ונס (Dow Jones Industrial Average):** רושם עלייה מתונה של **+0.18%** ל-**39,955 נקודות**, קרוב לרף ה-40,000.\n    *   **תשואת אג\"ח ארה\"ב ל-10 שנים:** יציבה יחסית סביב **4.42%**, לאחר ירידה קלה מהשיא האחרון, המשקפת ציפיות מעורבות לגבי הורדות ריבית.\n    *   **מחיר הנפט (WTI):** עומד על **79.85 דולר לחבית** (+0.6%), מושפע מהתפתחויות גיאופוליטיות במזרח התיכון וציפיות לביקוש.\n    *   **מחיר הזהב:** נסחר סביב **2,435 דולר לאונקיה** (+0.9%), ממשיך לטפס לרמות שיא, כנכס מקלט בטוח ועל רקע חולשת הדולר.\n    *   **מדד הדולר (DXY):** עומד על **104.5 נקודות**, חלש במעט מול סל המטבעות העיקריים, על רקע ציפיות להורדת ריבית עתידית בארה\"ב."
