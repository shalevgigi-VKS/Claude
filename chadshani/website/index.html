<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חדשני — דסק חדשות מודיעיני</title>

  <!-- Google Fonts — Heebo (Hebrew-optimised) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════ HEADER ════════════════════════════════ -->
  <header class="site-header">
    <div class="header-inner">

      <!-- Logo -->
      <a class="logo" href="#">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">
          <div class="logo-title">חדשני</div>
          <div class="logo-sub">דסק חדשות מודיעיני</div>
        </div>
      </a>

      <!-- Live clock + Hebrew date -->
      <div class="header-time">
        <span class="live-clock" id="live-clock">00:00:00</span>
        <span class="live-date"  id="live-date"></span>
      </div>

      <!-- Last-updated badge (populated by script.js from embedded JSON) -->
      <span class="ts-badge" id="ts-badge">טוען...</span>

      <button class="btn-export" onclick="exportAll()">ייצא הכל ✂</button>
    </div>
  </header>

  <!-- ══════════════ PAGE WRAPPER ══════════════════════════ -->
  <div class="page-wrapper">

    <!-- ── Image Carousel ────────────────────────────────── -->
    <section class="carousel-section" aria-label="תמונות תהליך">
      <div class="carousel-wrapper">
        <div class="carousel-track" role="region" aria-live="polite"></div>
        <!-- RTL: prev = right arrow, next = left arrow -->
        <button class="carousel-btn prev" aria-label="תמונה קודמת">&#8250;</button>
        <button class="carousel-btn next" aria-label="תמונה הבאה">&#8249;</button>
        <div class="carousel-dots" role="tablist" aria-label="בחירת תמונה"></div>
      </div>
    </section>

    <!-- ── Main content (built by script.js) ─────────────── -->
    <main id="main-content">

      <!-- Loading / empty state -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📡</div>
        <h2>טוען דסק חדשות...</h2>
        <p>הנתונים יופיעו בקרוב</p>
      </div>

      <!-- Cards injected here by initNewsCards() -->

    </main>

  </div><!-- /.page-wrapper -->

  <!-- ══════════════ FOOTER ════════════════════════════════ -->
  <footer class="site-footer">
    <span class="pulse-dot"></span>
    חדשני — מעדכן חדשות מודיעיני אוטונומי | מופעל על-ידי Gemini AI + Google Search
  </footer>

  <!-- Toast notification (copy/export feedback) -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- ══════════════ EMBEDDED DATA ══════════════════════════
    generate_website.py replaces PLACEHOLDER tokens with
    real JSON before deploying to GitHub Pages.
    Do NOT edit these manually.
  ══════════════════════════════════════════════════════════ -->
  <script id="news-data" type="application/json" data-updated="PLACEHOLDER_DATETIME">
PLACEHOLDER_NEWS_JSON
  </script>

  <script id="gauges-data" type="application/json">
PLACEHOLDER_GAUGES_JSON
  </script>

  <!-- ══════════════ APP SCRIPT ═════════════════════════════ -->
  <script src="script.js"></script>

</body>
</html>
