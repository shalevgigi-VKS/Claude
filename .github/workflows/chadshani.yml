name: חדשני — עדכון חדשות

on:
  # מופעל אוטומטית כשה-Apps Script דוחף JSON חדש
  push:
    paths:
      - 'chadshani/data/latest.json'

  # הפעלה ידנית מ-GitHub Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --quiet requests

      # שלב 1: חלץ content מה-JSON → temp_news.txt (מוסיף timestamp בתחילה)
      - name: Extract content from JSON
        run: |
          python -c "
          import json, pathlib
          data = json.loads(pathlib.Path('chadshani/data/latest.json').read_text(encoding='utf-8'))
          ts      = data.get('updated', '').replace(' ', ' | ', 1)
          content = (ts + '\n' + data['content']).strip() if ts else data['content']
          pathlib.Path('chadshani/temp_news.txt').write_text(content, encoding='utf-8')
          print('[OK] temp_news.txt נוצר —', len(content), 'תווים, updated:', ts)
          "

      # שלב 2: בנה את ה-HTML ושלח טלגרם
      - name: Build website
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_USER:        ${{ github.repository_owner }}
          GITHUB_REPO:        ${{ github.event.repository.name }}
          SKIP_GIT_PUSH:      "true"
        run: python chadshani/generate_website.py

      # שלב 3: commit + push ל-GitHub Pages
      - name: Commit and push
        run: |
          cp chadshani/website/style.css docs/style.css
          cp chadshani/website/script.js docs/script.js
          cp -r chadshani/karusela docs/karusela 2>/dev/null || true
          git config user.name  "חדשני Bot"
          git config user.email "chadshani@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "update $(date -u +'%Y-%m-%d %H:%M')"
          git pull --rebase origin master
          git push
