name: חדשני — עדכון חדשות

on:
  # מופעל אוטומטית כשה-Apps Script דוחף JSON חדש
  push:
    paths:
      - 'chadshani/data/latest.json'

  # הפעלה ידנית מ-GitHub Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --quiet requests

      # שלב 1: חלץ content מה-JSON → temp_news.txt (מוסיף timestamp בתחילה)
      - name: Extract content from JSON
        run: |
          python -c "
          import json, pathlib
          data = json.loads(pathlib.Path('chadshani/data/latest.json').read_text(encoding='utf-8'))
          ts      = data.get('updated', '').replace(' ', ' | ', 1)
          content = (ts + '\n' + data['content']).strip() if ts else data['content']
          pathlib.Path('chadshani/temp_news.txt').write_text(content, encoding='utf-8')
          print('[OK] temp_news.txt נוצר —', len(content), 'תווים, updated:', ts)
          "

      # שלב 2: בנה את ה-HTML (ללא שליחת טלגרם — יישלח אחרי push)
      - name: Build website
        env:
          GITHUB_USER:   ${{ github.repository_owner }}
          GITHUB_REPO:   ${{ github.event.repository.name }}
          SKIP_GIT_PUSH: "true"
          SKIP_TELEGRAM: "true"
        run: python chadshani/generate_website.py

      # שלב 3: commit + push ל-GitHub Pages
      - name: Commit and push
        run: |
          cp chadshani/website/style.css docs/style.css
          cp chadshani/website/script.js docs/script.js
          cp chadshani/SHALEV.PNG docs/SHALEV.PNG 2>/dev/null || true
          cp -r chadshani/karusela docs/karusela 2>/dev/null || true
          git config user.name  "חדשני Bot"
          git config user.email "chadshani@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "update $(date -u +'%Y-%m-%d %H:%M')"
          git pull --rebase origin master
          git push

      # שלב 4: שלח טלגרם רק אחרי שה-push הסתיים
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_USER:        ${{ github.repository_owner }}
          GITHUB_REPO:        ${{ github.event.repository.name }}
        run: |
          python -c "
          import os, requests, json
          from datetime import datetime
          from zoneinfo import ZoneInfo
          token   = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          user    = os.environ.get('GITHUB_USER','')
          repo    = os.environ.get('GITHUB_REPO','')
          now_il  = datetime.now(ZoneInfo('Asia/Jerusalem'))
          date_str = now_il.strftime('%d.%m.%Y')
          time_str = now_il.strftime('%H:%M')
          url_pages = f'https://{user}.github.io/{repo}'
          msg = f'עדכון החדשות מוכן נכון ל{date_str} {time_str}\n{url_pages}'
          requests.post(f'https://api.telegram.org/bot{token}/sendMessage',
            json={'chat_id': chat_id, 'text': msg}, timeout=10)
          print('[TELEGRAM_SENT]')
          "

