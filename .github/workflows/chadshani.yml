name: חדשני — עדכון חדשות

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '30 12 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch: {}

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Verify version
        run: git log --oneline -1 && grep -m1 "generativelanguage" chadshani/generate_news.py

      - name: Generate news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python chadshani/generate_news.py

      - name: Build website
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_USER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          SKIP_GIT_PUSH: "true"
        run: python chadshani/generate_website.py

      - name: Commit and push website
        run: |
          git config user.name "חדשני Bot"
          git config user.email "chadshani@users.noreply.github.com"
          git pull --rebase origin master
          git add docs/index.html
          git diff --staged --quiet || git commit -m "update $(date -u +'%Y-%m-%d %H:%M')"
          git push
